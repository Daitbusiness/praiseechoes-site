name: Update YouTube RSS

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

jobs:
  update-youtube-rss:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Fetch latest YouTube videos
        run: node .github/scripts/fetch-youtube-rss.mjs
        env:
          YOUTUBE_CHANNEL_HANDLE: '@PraiseEchoes'
          YOUTUBE_CHANNEL_ID: 'UC44B4Jzwvz4pbuZW9tuSjAg'
          YOUTUBE_MAX_RESULTS: '6'

      - name: Commit updated video data
        run: |
          if git diff --quiet -- data/latest-videos.json; then
            echo "No video data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest-videos.json
          git commit -m "Update latest YouTube videos"
          git push
